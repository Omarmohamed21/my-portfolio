<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:50px 0;
        }

        .title{
            text-align:center;
            margin-bottom:40px;
        }

        .title h1{
            font-size:3rem;
            margin-bottom:10px;
        }

        .title p{
            color:#94a3b8;
        }

        .video-section{
            margin-bottom:60px;
        }

        .video-section h2,
        .gallery-section h2{
            margin-bottom:20px;
            font-size:2rem;
        }

        video{
            width:100%;
            border-radius:15px;
            box-shadow:0 0 25px rgba(0,0,0,.4);
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:20px;
        }

        .gallery img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:15px;
            transition:.3s;
            cursor:pointer;
        }

        .gallery img:hover{
            transform:scale(1.03);
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:40px;
        }

        .btn{
            padding:12px 25px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        @media(max-width:768px){
            .title h1{
                font-size:2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="title">
        <h1>WebSocket Meeting Project</h1>
        <p>Real-Time Meeting Application using Node.js, Express.js and Socket.io</p>
    </div>

    <section class="video-section">
        <h2>Video Demonstration</h2>

        <video controls>
            <source src="meeting.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </section>

    <section class="gallery-section">
        <h2>Project Screenshots</h2>

        <div class="gallery">
            <img src="image1.png" alt="Screenshot 1">
            <img src="image2.png" alt="Screenshot 2">
            <img src="image3.png" alt="Screenshot 3">
            <img src="image4.png" alt="Screenshot 4">
            <img src="image5.png" alt="Screenshot 5">
            <img src="image6.png" alt="Screenshot 6">
            <img src="image7.png" alt="Screenshot 1">
            <img src="image8.png" alt="Screenshot 1">

        </div>
    </section>

    <div class="buttons">
        <a href="https://github.com/Omarmohamed21/WebSocket-Meeting-Project" target="_blank" class="btn">
            View GitHub
        </a>

        <a href="../index.html" class="btn">
            Back To Portfolio
        </a>
    </div>

</div>

</body>
</html>
